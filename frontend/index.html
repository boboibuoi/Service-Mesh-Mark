<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shopping Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 32px;
        font-weight: 750;
        letter-spacing: 0;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .mode {
        display: inline-flex;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        overflow: hidden;
        background: #ffffff;
      }

      .mode button {
        min-width: 84px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: #475569;
      }

      .mode button.active {
        background: #1d4ed8;
        color: #ffffff;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .product {
        display: grid;
        grid-template-columns: 1fr auto auto;
        align-items: center;
        gap: 14px;
        min-height: 64px;
        border: 1px solid #d7dee9;
        border-radius: 8px;
        background: #ffffff;
        padding: 12px 14px;
      }

      .name {
        font-weight: 700;
      }

      .meta {
        margin-top: 3px;
        color: #64748b;
        font-size: 14px;
      }

      button {
        min-height: 38px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        color: #172033;
        cursor: pointer;
        font: inherit;
        padding: 8px 14px;
      }

      input {
        min-height: 38px;
        width: 158px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        color: #172033;
        font: inherit;
        padding: 8px 10px;
      }

      button:hover {
        border-color: #1d4ed8;
      }

      button.buy {
        min-width: 76px;
        background: #0f766e;
        border-color: #0f766e;
        color: #ffffff;
        font-weight: 700;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.6;
      }

      .status {
        margin-top: 18px;
        border: 1px solid #d7dee9;
        border-radius: 8px;
        background: #ffffff;
        padding: 16px;
      }

      .status strong {
        display: inline-block;
        min-width: 126px;
      }

      .line {
        margin: 6px 0;
      }

      .ok {
        color: #047857;
      }

      .bad {
        color: #b91c1c;
      }

      .loading {
        color: #1d4ed8;
      }

      pre {
        margin: 14px 0 0;
        max-height: 220px;
        overflow: auto;
        border-radius: 8px;
        background: #111827;
        color: #e5e7eb;
        padding: 12px;
        white-space: pre-wrap;
      }

      @media (max-width: 560px) {
        .toolbar,
        .product {
          grid-template-columns: 1fr;
        }

        .toolbar {
          align-items: stretch;
        }

        .controls {
          display: grid;
          grid-template-columns: 1fr;
        }

        input {
          width: 100%;
        }

        .mode {
          width: 100%;
        }

        .mode button,
        button.buy {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Product List</h1>

      <div class="toolbar">
        <div class="controls">
          <input type="text" id="user-id" aria-label="User id" />
          <div class="mode" aria-label="Payment mode">
            <button type="button" class="active" data-mode="success">Success</button>
            <button type="button" data-mode="failed">Failed</button>
            <button type="button" data-mode="delayed">Delayed</button>
          </div>
        </div>
        <button type="button" id="refresh">Refresh</button>
      </div>

      <section id="products" class="list" aria-live="polite"></section>

      <section class="status" aria-live="polite">
        <div class="line"><strong>Order Status:</strong> <span id="order-status">Ready</span></div>
        <div class="line"><strong>Payment Status:</strong> <span id="payment-status">-</span></div>
        <div class="line"><strong>Notification:</strong> <span id="notification-status">-</span></div>
        <pre id="result">{}</pre>
      </section>
    </main>

    <script>
      const productServiceUrl = "http://127.0.0.1:18081";
      const orderServiceUrl = "http://127.0.0.1:18081";
      const productList = document.querySelector("#products");
      const result = document.querySelector("#result");
      const orderStatus = document.querySelector("#order-status");
      const paymentStatus = document.querySelector("#payment-status");
      const notificationStatus = document.querySelector("#notification-status");
      const userIdInput = document.querySelector("#user-id");
      let paymentMode = "success";

      userIdInput.value = getDemoUserId();

      function setStatus(order, payment = "-", notification = "-", className = "") {
        orderStatus.textContent = order;
        orderStatus.className = className;
        paymentStatus.textContent = payment;
        notificationStatus.textContent = notification;
      }

      function renderProducts(products) {
        productList.innerHTML = "";

        products.forEach((product) => {
          const row = document.createElement("article");
          row.className = "product";
          row.innerHTML = `
            <div>
              <div class="name">${product.name}</div>
              <div class="meta">$${product.price} - Stock ${product.stock}</div>
            </div>
            <div>${product.id}</div>
            <button type="button" class="buy">Buy</button>
          `;

          row.querySelector(".buy").addEventListener("click", () => buyProduct(product.id, row));
          productList.append(row);
        });
      }

      async function loadProducts() {
        productList.textContent = "Loading products...";
        const response = await fetch(`${productServiceUrl}/products`);
        const data = await response.json();
        renderProducts(data.products);
      }

      async function buyProduct(productId, row) {
        const button = row.querySelector(".buy");
        button.disabled = true;
        setStatus("Loading", "-", "-", "loading");
        result.textContent = "{}";

        try {
          const response = await fetch(`${orderServiceUrl}/orders`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Idempotency-Key": getRequestKey(),
            },
            body: JSON.stringify({
              user_id: userIdInput.value.trim() || getDemoUserId(),
              product_id: productId,
              quantity: 1,
              payment_mode: paymentMode,
            }),
          });
          const data = await response.json();

          if (!response.ok) {
            throw new Error(JSON.stringify(data));
          }

          const isSuccess = data.order_status === "confirmed";
          setStatus(
            isSuccess ? "Success" : "Failed",
            data.payment.payment_status,
            data.notification,
            isSuccess ? "ok" : "bad",
          );
          result.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          setStatus("Failed", "failed", "-", "bad");
          result.textContent = String(error);
        } finally {
          button.disabled = false;
        }
      }

      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll("[data-mode]").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          paymentMode = button.dataset.mode;
        });
      });

      document.querySelector("#refresh").addEventListener("click", () => {
        loadProducts().catch((error) => {
          productList.textContent = String(error);
        });
      });

      loadProducts().catch((error) => {
        productList.textContent = String(error);
      });

      function getDemoUserId() {
        const existingUserId = window.localStorage.getItem("demo_user_id");
        if (existingUserId) {
          return existingUserId;
        }

        const randomValue =
          window.crypto && window.crypto.randomUUID
            ? window.crypto.randomUUID().slice(0, 8)
            : String(Date.now()).slice(-8);
        const userId = `user-${randomValue}`;
        window.localStorage.setItem("demo_user_id", userId);
        return userId;
      }

      function getRequestKey() {
        const randomValue =
          window.crypto && window.crypto.randomUUID
            ? window.crypto.randomUUID()
            : `${Date.now()}-${Math.random()}`;
        return `order-${randomValue}`;
      }
    </script>
  </body>
</html>
