global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: meshmart
    environment: local

scrape_configs:
  # ── MeshMart application metrics (/metrics from prometheus-client) ──────────
  - job_name: order-service
    static_configs:
      - targets: ["order-service:8001"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: product-service
    static_configs:
      - targets: ["product-service:8004"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: payment-service
    static_configs:
      - targets: ["payment-service:8002"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:8003"]
    metrics_path: /metrics
    scrape_interval: 10s

  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
