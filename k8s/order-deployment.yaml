apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-service
  labels:
    app: order-service
    app.kubernetes.io/name: order-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
    app.kubernetes.io/name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        app.kubernetes.io/name: order-service
    spec:
      serviceAccountName: order-service
      containers:
        - name: order-service
          image: meshmart-service-mesh/order-service:v1.0.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          ports:
            - containerPort: 8001
          env:
            - name: FRONTEND_ORIGINS
              value: http://localhost:8080,http://127.0.0.1:8080,http://localhost:18080,http://127.0.0.1:18080
            - name: PRODUCT_SERVICE_URL
              value: http://product-service:8004
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:8002
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8003
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  labels:
    app: order-service
    app.kubernetes.io/name: order-service
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001

