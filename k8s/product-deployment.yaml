apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-service
  labels:
    app: product-service
    app.kubernetes.io/name: product-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  labels:
    app: product-service
    app.kubernetes.io/name: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
        app.kubernetes.io/name: product-service
    spec:
      serviceAccountName: product-service
      containers:
        - name: product-service
          image: meshmart-service-mesh/product-service:v1.0.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          ports:
            - containerPort: 8004
          env:
            - name: FRONTEND_ORIGINS
              value: http://localhost:8080,http://127.0.0.1:8080,http://localhost:18080,http://127.0.0.1:18080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  labels:
    app: product-service
    app.kubernetes.io/name: product-service
spec:
  selector:
    app: product-service
  ports:
    - name: http
      port: 8004
      targetPort: 8004

